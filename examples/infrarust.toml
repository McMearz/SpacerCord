# SpacerCord proxy configuration
servers_dir = "./servers"

# Bundled SpacetimeDB integration.
# SpacerCord will automatically install, start, and manage the SpacetimeDB server process.
[spacetimedb]
enabled = true
uri = "http://127.0.0.1:3000"
listen = "127.0.0.1:3000"
db_name = "spacer-cord"
auto_install = true
module_path = "./stdb-module"

# Web admin API / UI
[web]
enable_api = true
enable_webui = true
bind = "127.0.0.1:8080"
# Use this key to log in to the dashboard
api_key = "spacer-cord-secure-admin-key-2026"
cors_origins = []

[web.rate_limit]
requests_per_minute = 1000

[ban]
file = "./bans.json"
purge_interval = "5m"
enable_audit_log = true
